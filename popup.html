<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: -apple-system, sans-serif;
      background: #1a1a1a;
      color: #fff;
    }

    .header {
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      border-bottom: 1px solid #2a2a2a;
    }

    section {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a2a;
    }

    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #555;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
    }

    .platform-name {
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.yt { background: #ff0000; }
    .dot.ig { background: #e1306c; }
    .dot.fb { background: #1877f2; }

    /* Toggle switch */
    .switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #3a3a3a;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #888;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    input:checked + .slider { background: #3a1a1a; }
    input:checked + .slider::before { transform: translateX(16px); background: #ff4444; }

    /* Speed buttons */
    .speed-group {
      display: flex;
      gap: 6px;
    }
    .speed-btn {
      flex: 1;
      padding: 6px 0;
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #777;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .speed-btn:hover { background: #333; color: #aaa; }
    .speed-btn.active {
      background: #3a1a1a;
      border-color: #ff4444;
      color: #ff4444;
      font-weight: 600;
    }

    /* Counter */
    .counter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .counter-num {
      font-size: 32px;
      font-weight: 700;
      color: #ff4444;
      line-height: 1;
    }
    .counter-label {
      font-size: 11px;
      color: #555;
      margin-top: 3px;
    }
    .reset-btn {
      background: #2a2a2a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #555;
      font-size: 11px;
      font-family: inherit;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:hover { color: #aaa; border-color: #444; }

    /* Download button */
    .download-btn {
      width: 100%;
      padding: 9px 0;
      background: #1a2e1a;
      border: 1px solid #2a5a2a;
      border-radius: 7px;
      color: #4caf50;
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .download-btn:hover { background: #223522; border-color: #4caf50; }
    .download-btn:active { opacity: 0.8; }
    .download-btn.loading { opacity: 0.6; cursor: default; }
    .download-btn.error { background: #2e1a1a; border-color: #993333; color: #cc4444; }
    .download-btn.success { background: #1a2e1a; border-color: #4caf50; color: #81c784; }

    .download-status {
      font-size: 10px;
      color: #555;
      margin-top: 6px;
      text-align: center;
      min-height: 14px;
    }
    .download-status.err { color: #cc4444; }
  </style>
</head>
<body>
  <div class="header">Auto Reels Next</div>

  <section>
    <div class="section-title">Πλατφόρμες</div>
    <div class="row">
      <span class="platform-name"><span class="dot yt"></span>YouTube Shorts</span>
      <label class="switch"><input type="checkbox" id="tog-youtube"><span class="slider"></span></label>
    </div>
    <div class="row">
      <span class="platform-name"><span class="dot ig"></span>Instagram Reels</span>
      <label class="switch"><input type="checkbox" id="tog-instagram"><span class="slider"></span></label>
    </div>
    <div class="row">
      <span class="platform-name"><span class="dot fb"></span>Facebook Reels</span>
      <label class="switch"><input type="checkbox" id="tog-facebook"><span class="slider"></span></label>
    </div>
  </section>

  <section>
    <div class="section-title">Ταχύτητα</div>
    <div class="speed-group">
      <button class="speed-btn" data-speed="1">1×</button>
      <button class="speed-btn" data-speed="1.5">1.5×</button>
      <button class="speed-btn" data-speed="2">2×</button>
    </div>
  </section>

  <section>
    <div class="section-title">Reels που είδες</div>
    <div class="counter-row">
      <div>
        <div class="counter-num" id="counter">0</div>
        <div class="counter-label">σύνολο</div>
      </div>
      <button class="reset-btn" id="reset">Μηδενισμός</button>
    </div>
  </section>

  <section>
    <div class="section-title">Λήψη</div>
    <button class="download-btn" id="download-btn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 12l-5-5h3V2h4v5h3L8 12z"/>
        <rect x="2" y="13" width="12" height="1.5" rx="0.75"/>
      </svg>
      Κατέβασε το τρέχον Reel
    </button>
    <div class="download-status" id="dl-status"></div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
