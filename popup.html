<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 220px;
      padding: 18px 16px;
      font-family: -apple-system, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
    }
    .right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #label {
      font-size: 13px;
      min-width: 64px;
      text-align: right;
    }

    /* Toggle switch */
    .switch { position: relative; width: 42px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #444;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #ff0000; }
    input:checked + .slider::before { transform: translateX(18px); }
  </style>
</head>
<body>
  <span class="title">Auto Shorts</span>
  <div class="right">
    <span id="label"></span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
